# SilverSurfers — Full Stack Project Compose
# 
# Includes:
#   - Redis (Job queue/cache)
#   - API (Backend server)
#   - Worker (Background processor)
#   - Scanner (Headless Chromium / Lighthouse)
#   - Frontend (React SPA + Nginx)

services:

  # ──────────────────────────────────────────────
  # Frontend — React SPA + Nginx
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_URL=http://localhost:8000
    container_name: ss-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - ssnet

  # ──────────────────────────────────────────────
  # Redis — BullMQ broker
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ss-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes --loglevel warning
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ssnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # API — Backend server
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ss-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Specific overrides for Docker networking
      PORT: 8000
      REDIS_URL: redis://redis:6379
      SCANNER_SERVICE_URL: http://scanner:8001
      NODE_ENV: production
    ports:
      - "8000:8000"
    networks:
      - ssnet
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/healthz', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────
  # Worker — Background auditor
  # ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: ss-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      scanner:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      SCANNER_SERVICE_URL: http://scanner:8001
      NODE_ENV: production
    networks:
      - ssnet

  # ──────────────────────────────────────────────
  # Scanner — Headless Lighthouse scanner
  # ──────────────────────────────────────────────
  scanner:
    build:
      context: ./backend
      dockerfile: Dockerfile.scanner
    container_name: ss-scanner
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      SCANNER_PORT: 8001
      REDIS_URL: redis://redis:6379
      CHROME_PATH: /usr/bin/chromium
      CHROMIUM_PATH: /usr/bin/chromium
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      NODE_ENV: production
    security_opt:
      - seccomp:unconfined
    ports:
      - "8001:8001"
    networks:
      - ssnet
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8001/healthz', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

networks:
  ssnet:
    driver: bridge

volumes:
  redis_data:
    driver: local
